<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Möt Historien – Gy25 Full Page Archive</title>
<style>
  body { font-family: system-ui; margin: 0; padding: 20px; background: #f8f9fa; }
  h1 { text-align: center; }
  #search { width: 300px; padding: 12px; font-size: 1.1rem; margin: 20px auto; display: block; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .card:hover { transform: scale(1.03); }
  .card img {
    width: 100%;
    height: 300px;
    object-fit: contain;
    background: #f1f1f1;
  }
  .card p {
    padding: 12px;
    margin: 0;
    text-align: center;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>Möt Historien – Gy25 Historia 1a1<br><small>Alla sidor (klicka för full storlek)</small></h1>
<input type="text" id="search" placeholder="Sök sida nr (t.ex. 229)" onkeyup="filterPages()">

<div class="grid" id="gallery"></div>

<script>
fetch('manifest.json')
  .then(r => r.json())
  .then(data => {
    const gallery = document.getElementById('gallery');
    data.pages.forEach(page => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <a href="${page.url}" target="_blank">
          <img src="${page.url}" loading="lazy" alt="Sida ${page.page}">
        </a>
        <p>Sida ${page.page} – ${page.filename}</p>
      `;
      gallery.appendChild(card);
    });
  });

function filterPages() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(term) ? 'block' : 'none';
  });
}
</script>
</body>
</html>
