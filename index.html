<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page temporarily unavailable</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f8f9fa;
      color: #2d3436;
      font-family: system-ui, -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    .container {
      max-width: 620px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      margin: 0 0 0.8rem 0;
      color: #e74c3c;
    }
    .en {
      font-size: 2.1rem;
      font-weight: 500;
      margin: 0 0 1.8rem 0;
      color: #2c3e50;
    }
    .sv {
      font-size: 2.1rem;
      font-weight: 500;
      margin: 0 0 2.2rem 0;
      color: #2c3e50;
    }
    .date {
      font-size: 1.1rem;
      color: #7f8c8d;
      margin-top: 1.5rem;
    }
    @media (max-width: 550px) {
      h1 { font-size: 2.9rem; }
      .en, .sv { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Coming back soon</h1>

    <div class="en">
      This page is currently taken down / under maintenance
    </div>

    <div class="sv">
      Denna sida är för närvarande nedtagen / under arbete
    </div>

    <div class="date">
      March 18, 2026
    </div>
  </div>

</body>
</html>
